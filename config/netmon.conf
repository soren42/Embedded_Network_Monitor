# Embedded Network Monitor Configuration
# Lines starting with # or ; are comments
# Format: key = value

# Ping target (gateway IP)
ping_target = 10.0.0.1

# DNS server for connectivity checks
dns_target = 8.8.8.8

# Hostname for DNS resolution test
dns_test_hostname = google.com

# Enable promiscuous mode on network interfaces (1=on, 0=off)
promiscuous_mode = 1

# WiFi configuration
wifi_enabled = 1
wifi_ssid = solarian
wifi_password = S0l@r1@n

# Alert thresholds
alert_bw_warn_pct = 80
alert_bw_crit_pct = 95
alert_ping_warn_ms = 100
alert_ping_crit_ms = 500
alert_err_threshold = 10

# Interfaces to ignore for alerts (comma-separated)
alert_ignore_ifaces = usb0

# Infrastructure devices
infra_count = 3
infra_0_name = Router
infra_0_ip = 10.0.0.1
infra_0_type = router
infra_1_name = Switch
infra_1_ip = 10.0.0.3
infra_1_type = switch
infra_2_name = AP
infra_2_ip = 10.0.99.56
infra_2_type = ap
